<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmed — KitabGhar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<section style="padding:5rem 0;min-height:70vh"><div class="container">
  <div style="text-align:center;max-width:520px;margin:0 auto">
    <div style="font-size:5rem;margin-bottom:1rem">🎉</div>
    <h1 style="font-size:2.2rem;color:var(--green)">Order Confirmed!</h1>
    <p id="ord-id" style="color:var(--muted2);margin:.75rem 0"></p>
    <p style="color:var(--muted2);max-width:420px;margin:0 auto 2rem">Thank you! Your order has been received. Our team will contact you within 24 hours to confirm delivery.</p>
    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn btn-primary btn-lg">Go to Homepage</a>
      <a href="categories.html" class="btn btn-outline btn-lg">Shop More Books</a>
    </div>
  </div>
</div></section>
<div id="site-footer"></div>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
(async()=>{
  await Store.ready();
  mountLayout();
  const id=new URLSearchParams(location.search).get('order');
  if(id)document.getElementById('ord-id').textContent='Order ID: '+id;
})();
</script>
</body></html>
